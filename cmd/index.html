#!/usr/bin/env python3

import sys
import urllib.request
import subprocess
import tempfile
import os

BASE_URL = "https://karlo.observer/"
SCRIPTS = {
    "sysinfo": {
        "description": "Show basic system information",
        "url": BASE_URL + "cmd/sysinfo"
    }
}

# ANSI escape codes
RED = "\033[31m"
GREEN = "\033[32m"
YELLOW = "\033[33m"
BLUE = "\033[34m"
RESET = "\033[0m"

def run_script(name, args=None):
    if name not in SCRIPTS:
        print(f"Unknown script: {name}")
        return

    args = args or []
    script_url = SCRIPTS[name]["url"]

    # Download the script to a temporary file
    with tempfile.NamedTemporaryFile("w+", delete=False, suffix=".py") as tmp:
        try:
            with urllib.request.urlopen(script_url) as response:
                tmp.write(response.read().decode())
            tmp.flush()
        except Exception as e:
            print(f"Failed to fetch script: {e}")
            return

        # Execute the downloaded script with forwarded arguments
        cmd = ["python3", tmp.name] + args
        subprocess.run(cmd)

def print_help():
    print("\n=== Remote Python Script Environment ===\n")
    print("Scripts:")
    for name, info in SCRIPTS.items():
        print(f"{name:<12} - {info.get('description','')}")
    print("\nInteractive: type a script name, 'help', or 'exit'.")
    print("Direct: curl -s karlo.observer/cmd/ | python - <script>\n")

def main():
    # Direct script execution if arguments are given
    if len(sys.argv) > 1:
        script_name = sys.argv[1]
        script_args = sys.argv[2:]
        run_script(script_name, script_args)
        return

    print_help()

    # Use /dev/tty to read from terminal even when stdin is piped
    if os.name == "nt":
        tty_in = sys.stdin
    else:
        try:
            tty_in = open("/dev/tty", "r")
        except Exception:
            tty_in = sys.stdin

    while True:
        try:
            # Show prompt explicitly
            print(f"{GREEN}cmd>{RESET} ", end="", flush=True)
            inp = tty_in.readline().strip()
            if not inp:
                continue
            inp = inp.strip()
            if not inp:
                continue
            if inp.lower() in ("exit", "quit"):
                print("Exiting.\n")
                break
            if inp.lower() == "help":
                print_help()
                continue

            parts = inp.split()
            script_name, *script_args = parts
            run_script(script_name, script_args)
        except (EOFError, KeyboardInterrupt):
            print("\nExiting.\n")
            break

if __name__ == "__main__":
    main()
