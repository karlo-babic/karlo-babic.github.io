#!/usr/bin/env python3

SCRIPTS = {
    "sysinfo": {
        "description": "Show basic system information",
        "args": []
    }
}


def main():
    print("Available scripts:\n")

    for name, info in SCRIPTS.items():
        desc = info.get("description", "")
        print(f"{name:<15} {desc}")

        args = info.get("args", [])
        for arg in args:
            print(f"  - {arg.get('name', '')}: {arg.get('description', '')}")

        if args:
            print()
    
    print("\nUsage:\ncurl -s url/cmd/<script> | python")


if __name__ == "__main__":
    main()
