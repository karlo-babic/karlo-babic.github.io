<!DOCTYPE html>
<html>
<head>
    <title>Karlo's observatory</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Karlo Babić">
    <link rel="shortcut icon" href="imgs/favicon.ico">
    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet' type='text/css'>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/console.css">
</head>

<body>
    <div id="smoke"></div>

    <div id="eye" class="h1">       
       = = = =
    </div>
    <br />
    <div id="eyeSpeech" class="h1"> </div>

    <!--------------------------------------------------------------->
    <br />
    <div class="main-layout-container">
        <div class="content-block">
            
            <!-- About Me Section -->
            <div class="h2 section-title">
                <a href="#" id="rocket-placeholder">
                    <img id="rocket" src="imgs/rocket_off.png" width="12" title="rocket">
                </a>
                <span class="section-trigger" data-section-file="about-me">bout me</span>
                <div id="threebody">
                    <a href="#" id="threebody-link">
                        <img id="threebody-img" src="imgs/dots.png" width="35" title="three body problem">
                    </a>
                </div>
            </div>
            <br />
    
            <!-- Research Section -->
            <div class="h2 section-title">
                <span class="section-trigger" data-section-file="research">research</span>
            </div>
            <br />
                  
            <!-- Lectures Section -->
            <div class="h2 section-title">
                <span class="section-trigger" data-section-file="lectures">lectures</span>
            </div>
            <br />
    
            <!-- Pages Section -->
            <div class="h2 section-title">
                <span class="section-trigger" data-section-file="pages">pages</span>
            </div>
            <br />
    
            <!-- Gamedev Section -->
            <div class="h2 section-title">
                <span class="section-trigger" data-section-file="games">games</span>
            </div>
            <br />
    
            <!-- Fiction Section -->
            <div class="h2 section-title">
                <span class="section-trigger" data-section-file="fiction">fiction</span>
            </div>
            <br />
    
        </div>
        
        <!-- Console Window -->
        <div id="console-window">
            <div id="console-screen"></div>
                <div id="console-controls">
                    <!-- Restart Program -->
                    <button id="restart-program" class="console-btn" title="Restart Program">
                        <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                    </button>
                    
                    <div class="dropdown" id="program-dropdown">
                        <button id="current-program-btn" class="console-btn dropdown-btn"></button>
                        <div id="program-list" class="dropdown-content"></div>
                    </div>

                    <!-- Next Program -->
                    <button id="next-program" class="console-btn" title="Next Program">
                        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </button>
                        
                    <div id="console-input-wrapper">
                        <textarea id="program-input" class="console-input" rows="1" spellcheck="false"></textarea>
                        <span id="console-suggestion"></span>
                    </div>

                    <!-- Fullscreen / External Link Icon -->
                    <button id="fullscreen-btn" class="console-btn" title="Open in New Tab">
                        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </button>
                </div>
        </div>
    </div>

    <center>
        <br><br>
        <!-- Paperfall Placeholder -->
        <div id="paper-placeholder" style="cursor: pointer; display: inline-block; margin-bottom: 20px;">
            <img id="paper" src="imgs/paper.png" width="30" title="paperfall">
        </div>

        <div id="quote-container">
            <div id="quote"></div>
        </div>
    </center>
    <!--------------------------------------------------------------->

    <!-- All scripts are loaded as modules from main.js -->
    <script type="module" src="scripts/main.js"></script>
</body>
</html>
