<!DOCTYPE html>
<html>
<head>
    <title>Console</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="shortcut icon" href="imgs/favicon.ico">
    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet' type='text/css'>

    <!-- Include only the necessary stylesheets for the console to function and look correct. -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/console.css">
</head>

<body>
    <!-- 
        The console window is the only major element on this page.
        The 'fullscreen' class is added directly here to make it fullscreen on load.
    -->
    <div id="console-window" class="fullscreen">
        <div id="console-screen"></div>
            <div id="console-controls">
                <!-- Restart Program -->
                <button id="restart-program" class="console-btn" title="Restart Program">
                    <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
                
                <div class="dropdown" id="program-dropdown">
                    <button id="current-program-btn" class="console-btn dropdown-btn"></button>
                    <div id="program-list" class="dropdown-content"></div>
                </div>

                <!-- Next Program -->
                <button id="next-program" class="console-btn" title="Next Program">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
                    
                <div id="console-input-wrapper">
                    <textarea id="program-input" class="console-input" rows="1" spellcheck="false"></textarea>
                    <span id="console-suggestion"></span>
                </div>

                <!-- View-Only Icon -->
                <button id="view-only-btn" class="console-btn" title="Open View-Only Link">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
            </div>
    </div>


    <!-- 
        This embedded script acts as the entry point for the console-only page.
        It imports the Console module and initializes it immediately.
    -->
<script type="module">
    import { Console } from './scripts/console.js';

    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        
        const programToRun = urlParams.get('run');     // View-only mode
        const programToStart = urlParams.get('start'); // Interactive mode

        if (programToRun) {
            // --- View-Only Logic ---
            let title = programToRun.charAt(0).toUpperCase() + programToRun.slice(1);

            if (programToRun === 'read') {
                const filename = urlParams.get('file');
                if (filename) title = filename;
            }
            document.title = title;

            const controls = document.getElementById('console-controls');
            if (controls) controls.style.display = 'none';

            const args = { positional: [], named: {} };
            for (const [key, value] of urlParams.entries()) {
                if (key !== 'run') {
                    const numValue = parseFloat(value);
                    args.named[key] = isNaN(numValue) ? value : numValue;
                }
            }
            if (programToRun === 'read' && urlParams.has('file')) {
                args.positional = [urlParams.get('file')];
            }
            
            Console.windowEl = document.getElementById('console-window');
            Console.screenEl = document.getElementById('console-screen');
            Console.loadProgram(programToRun, args);

        } else {
            // --- Interactive Logic ---
            // Initialize the UI and controls.
            Console.init(programToStart || 'help');

            // If a specific program was requested via 'start', re-load it with parsed arguments.
            if (programToStart) {
                const args = { positional: [], named: {} };
                for (const [key, value] of urlParams.entries()) {
                    if (key !== 'start') {
                        const numValue = parseFloat(value);
                        args.named[key] = isNaN(numValue) ? value : numValue;
                    }
                }
                if (programToStart === 'read' && urlParams.has('file')) {
                    args.positional = [urlParams.get('file')];
                }
                Console.loadProgram(programToStart, args);
            }
        }
    });
</script>
</body>
</html>
